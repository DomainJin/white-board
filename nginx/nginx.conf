worker_processes auto;

events {
    worker_connections 4096;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

    upstream server_backend {
        server server:3001;
        keepalive 32;
    }

    upstream client_frontend {
        server client:80;
    }

    server {
        listen 80;
        server_name _;      # thay bằng domain thật khi deploy

        # Health check cho docker
        location /health {
            access_log off;
            return 200 'ok';
        }

        # API HTTP
        location /api/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass http://server_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Socket.IO — quan trọng: phải enable WebSocket upgrade
        location /socket.io/ {
            proxy_pass http://server_backend;
            proxy_http_version 1.1;

            # WebSocket handshake headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_bypass $http_upgrade;

            # Timeout dài hơn cho WS connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Frontend SPA
        location / {
            proxy_pass http://client_frontend;
            proxy_set_header Host $host;
        }
    }

    # ── HTTPS (bỏ comment khi đã có SSL cert) ────────────────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate     /etc/nginx/certs/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/certs/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #
    #     # ... (copy các location blocks từ trên xuống)
    # }
    #
    # server {
    #     listen 80;
    #     return 301 https://$host$request_uri;
    # }
}
